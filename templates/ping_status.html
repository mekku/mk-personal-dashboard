<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ping Status</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .grid-status {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            grid-gap: 10px;
        }

        .status {
            font-size: 1.5em;
            padding: 10px;
            color: white;
            border-radius: 5px;
            text-align: center;
        }

        .status div {
            margin: 0;
        }

        .status .host {
            font-size: 1.5em;
        }

        .status .status {
            font-size: 1em;
            text-transform: uppercase;
        }

        .status .ping-time {
            font-size: 0.5em;
        }

        .status-online {
            background: green;
        }

        .status-offline {
            background: red;
        }
    </style>
</head>

<body>
    <div class="grid-status">
        {% for host in ping_time %}
        <div class="status status-{{status[host]}}">
            <div class="host">{{host|replace("VAR-BOT-", "")}}</div>
            <div class="status">{{status[host]}}</div>
            <div class="ping-time">{{ping_time[host]}}</div>
        </div>
        {% endfor %}
    </div>
</body>

</html>
