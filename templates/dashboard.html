            const formatValue = (price, round = false) => {
                if (Math.abs(price) < 1.0) {
                    return numeral(price).format('0.0000');
                }
                else if (Math.abs(price) < 10.0) {
                    return numeral(price).format('0.00');
                }
                else if (Math.abs(price) < 100.0) {
                    return numeral(price).format('0.0');
                }
                else {
                    return numeral(price).format('0,0');
                }
            };

            const renderDigits = (value, round = false) => {
                let strValue = formatValue(value, round);
                let digits = strValue.split('');
                let result = [];

                for (let i = 0; i < digits.length; i++) {
                    if (digits[i] === '.') {
                        result.push(<span class="digit dot">.</span>);
                    }
                    else if (digits[i] === ',') {
                        result.push(<span class="digit comma">,</span>);
                    }
                    else {
                        result.push(<span class="digit">{digits[i]}</span>);
                    }
                }

                return result;
            };

                return (
                    <div class={`homeassistant ${status.status === 'alert' ? 'alert' : status.status === 'error' ? 'error' : 'normal'}`}>

                        <div class="homeassistant-sensor">
                            {status.error ? (
                                <div class="sensor-error">{status.error}</div>
                            ) : (
                                <div class="sensor-info">
                                    <div class="sensor-name">{status.friendly_name || 'DTU AC Daily Energy'}</div>

                const [homeAssistantStatus, setHomeAssistantStatus] = useState({});

                    }, 10000);

                    return () => {
                        clearInterval(interval);
                    };

                const updateHomeAssistantStatus = async () => {
                    try {
                        const url = '/homeassistant';
                        const headers = {
                            "Content-Type": "application/json"
                        };
                        const response = await fetch(url, {
                            method: 'GET',
                            headers: headers
                        });

                        const data = await response.json();
                        setHomeAssistantStatus(data);
                    } catch (error) {
                        console.error('Failed to fetch Home Assistant status:', error);
                        setHomeAssistantStatus({
                            error: 'Failed to fetch data',
                            status: 'error'
                        });
                    }
                };

                return <HomeAssistantStatus status={homeAssistantStatus} />;
            };

                        month: 'long',
                        day: 'numeric'

                };

                        });

                            <div class="price-vosc">{numeral(voscData[`${symbol}USDT`]).format('0,0.00')}%</div>
                            <div class="price-number">{renderDigits(priceData[`${symbol}USDT`])}</div>
                        </div>
                    );
                };

                return <div>
                    <div class="realtime-price">
                        {renderRealtimePrice('BTC')}
                        {renderRealtimePrice('ETH')}
                        {renderRealtimePrice('SOL')}
                        {renderRealtimePrice('DOGE')}
                        {renderRealtimePrice('XRP')}

                        <div class="display-price" id="upnl">
                            <div class="symbol">Unrealize PnL</div>
                            <div class="price-number">{renderDigits(totalPnl, true)}</div>
                        </div>

                        <div class="display-price" id="aum">
                            <div class="symbol">AUM</div>
                            <div class="price-number">{renderDigits(aum, true)}</div>
                        </div>
                    </div>

                    <div class="portfolios">
                        {Object.keys(portfolios).map((key) => {
                            return <Portfolio portfolio={portfolios[key]} currentPrices={priceData} pingTimes={pingTimes[key]} />;
                        })}
                    </div>

                    <div class="jenkins">
                        <div class="jenkins-title">Jenkins Status</div>
                        <div class="jenkins-jobs">
                            {jenkinsStatus.jobs && jenkinsStatus.jobs.map((job) => {
                                return <div class={`jenkins-job job-${job.color}`}>{job.name}</div>;
                            })}
                        </div>
                    </div>
                </div>;
            };

            const socket = io();
            render(<RealTimeVosc socket={socket} />, document.getElementById('app'));
            render(<Clock />, document.getElementById('clock'));
            render(<HomeAssistantApp />, document.getElementById('homeassistant-status'));
        </script>
</body>

</html>
